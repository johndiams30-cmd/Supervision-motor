<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔥 IoT Firebase - Contrôle Moteur</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Login */
        .login-card,
        .app-card {
            background: #1e1e2f;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .login-card h2,
        .app-card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffaa00;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ffaa00;
            border-radius: 10px;
            background: #2a2a3a;
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #ffaa00;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .switch {
            text-align: center;
            margin-top: 15px;
            color: #ffaa00;
            cursor: pointer;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        /* App */
        .status-card {
            background: linear-gradient(135deg, #ffaa00, #ff6600);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 20px;
        }

        .led {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 15px auto;
        }

        .led-on {
            background: radial-gradient(circle at 30% 30%, #fff, #ffeb3b);
            box-shadow: 0 0 30px #ffeb3b;
            animation: pulse 1s infinite;
        }

        .led-off {
            background: radial-gradient(circle at 30% 30%, #555, #222);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-on {
            background: #00b09b;
            color: white;
        }

        .btn-off {
            background: #ff6b6b;
            color: white;
        }

        .info-card {
            background: #2a2a3a;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            background: #2a2a3a;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .history-on {
            color: #00b09b;
        }

        .history-off {
            color: #ff6b6b;
        }

        .logout-btn {
            background: #ff6b6b;
            margin-top: 20px;
        }

        .user-email {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Écran de connexion -->
        <div id="loginScreen">
            <div class="login-card">
                <h2>🔐 IoT Firebase</h2>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Mot de passe">
                <button id="doLogin">Se connecter</button>
                <div class="switch" id="showRegisterBtn">Pas de compte ? Créer un compte</div>
                <div class="error" id="loginError"></div>
            </div>
        </div>

        <!-- Écran d'inscription -->
        <div id="registerScreen" style="display: none;">
            <div class="login-card">
                <h2>📝 Créer un compte</h2>
                <input type="email" id="registerEmail" placeholder="Email">
                <input type="password" id="registerPassword" placeholder="Mot de passe (6+ caractères)">
                <button id="doRegister">Créer le compte</button>
                <div class="switch" id="showLoginBtn">Déjà un compte ? Se connecter</div>
                <div class="error" id="registerError"></div>
            </div>
        </div>

        <!-- Application principale -->
        <div id="appScreen" style="display: none;">
            <div class="app-card">
                <h2>🔥 Contrôle Moteur</h2>
                <div class="user-email" id="userEmail"></div>

                <div class="status-card">
                    <h3>État du Moteur</h3>
                    <div class="led led-off" id="led"></div>
                    <h2 id="motorStatus">ARRÊT</h2>
                    <div class="btn-group">
                        <button class="btn-on" id="btnOn">🟢 MARCHE</button>
                        <button class="btn-off" id="btnOff">🔴 ARRÊT</button>
                    </div>
                </div>

                <div class="info-card">
                    <div class="info-row">
                        <span>📱 Dernière commande</span>
                        <span id="lastCommand" style="color:#ffaa00;">-</span>
                    </div>
                    <div class="info-row">
                        <span>💻 Appareil</span>
                        <span id="lastDevice" style="color:#ffaa00;">-</span>
                    </div>
                    <div class="info-row">
                        <span>⏰ Date/Heure</span>
                        <span id="lastTime" style="color:#ffaa00;">-</span>
                    </div>
                </div>

                <div class="info-card">
                    <h3>📜 Historique</h3>
                    <div class="history-list" id="historyList">
                        <div style="text-align:center;padding:20px;">Chargement...</div>
                    </div>
                </div>

                <button class="logout-btn" id="logoutBtn">🚪 Se déconnecter</button>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyDLy3kKY6Hh0mOL07hfAT57ULiuE3fXnk8",
            authDomain: "iot-moteur-controle.firebaseapp.com",
            databaseURL: "https://iot-moteur-controle-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "iot-moteur-controle",
            storageBucket: "iot-moteur-controle.firebasestorage.app",
            messagingSenderId: "36220333719",
            appId: "1:36220333719:web:483313a74a280096d983d2"
        };

        // Initialisation
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Variables
        let currentMotorState = 0;

        // ===== AUTHENTIFICATION =====
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Utilisateur connecté
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('registerScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('userEmail').textContent = user.email;
                initApp();
            } else {
                // Utilisateur déconnecté
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('registerScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'none';
            }
        });

        // Connexion
        document.getElementById('doLogin').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                document.getElementById('loginError').textContent = '';
            } catch (error) {
                document.getElementById('loginError').textContent = error.message;
            }
        };

        // Inscription
        document.getElementById('doRegister').onclick = async () => {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                document.getElementById('registerError').textContent = '';
            } catch (error) {
                document.getElementById('registerError').textContent = error.message;
            }
        };

        // Changer d'écran
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('registerScreen').style.display = 'block';
        };
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('registerScreen').style.display = 'none';
        };

        // Déconnexion
        document.getElementById('logoutBtn').onclick = () => auth.signOut();

        // ===== FONCTIONS PRINCIPALES =====
        function getDeviceType() {
            return /mobile|android|iphone/i.test(navigator.userAgent) ? "📱 Mobile" : "💻 PC";
        }

        function updateLED(state) {
            const led = document.getElementById('led');
            const motorStatus = document.getElementById('motorStatus');
            if (state === 1) {
                led.className = 'led led-on';
                motorStatus.innerHTML = 'MARCHE ✅';
            } else {
                led.className = 'led led-off';
                motorStatus.innerHTML = 'ARRÊT ❌';
            }
        }

        function formatDate(timestamp) {
            return new Date(timestamp).toLocaleString('fr-FR');
        }

        async function sendCommand(value) {
            const device = getDeviceType();
            const commandText = value === 1 ? 'MARCHE' : 'ARRÊT';

            try {
                // Envoyer l'état
                await database.ref('moteur/etat').set({
                    valeur: value,
                    appareil: device,
                    timestamp: Date.now()
                });

                // Ajouter à l'historique
                await database.ref('historique').push({
                    valeur: value,
                    appareil: device,
                    timestamp: Date.now()
                });

                showNotification(`✅ ${commandText} envoyé`);
            } catch (error) {
                showNotification(`❌ Erreur: ${error.message}`, true);
            }
        }

        function listenToMotorState() {
            database.ref('moteur/etat').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    currentMotorState = data.valeur;
                    updateLED(currentMotorState);
                    document.getElementById('lastCommand').innerHTML = data.valeur === 1 ? '🟢 MARCHE' : '🔴 ARRÊT';
                    document.getElementById('lastDevice').innerHTML = data.appareil;
                    document.getElementById('lastTime').innerHTML = formatDate(data.timestamp);
                }
            });
        }

        async function loadHistory() {
            try {
                const snapshot = await database.ref('historique').limitToLast(10).once('value');
                const data = snapshot.val();
                const historyDiv = document.getElementById('historyList');

                if (!data) {
                    historyDiv.innerHTML = '<div style="text-align:center;padding:20px;">Aucune commande</div>';
                    return;
                }

                const historyArray = Object.values(data).reverse();
                historyDiv.innerHTML = historyArray.map(item => `
                    <div class="history-item">
                        <div>
                            <span class="${item.valeur === 1 ? 'history-on' : 'history-off'}">
                                ${item.valeur === 1 ? '🟢 MARCHE' : '🔴 ARRÊT'}
                            </span>
                            <div style="font-size: 10px; color: #888;">${item.appareil}</div>
                        </div>
                        <div class="timestamp">${formatDate(item.timestamp)}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        function showNotification(msg, isError = false) {
            const div = document.createElement('div');
            div.textContent = msg;
            div.style.cssText = `position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:${isError ? '#ff6b6b' : '#00b09b'}; color:white; padding:12px 24px; border-radius:50px; z-index:2000; animation:slideUp 0.3s ease;`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function initApp() {
            document.getElementById('btnOn').onclick = () => sendCommand(1);
            document.getElementById('btnOff').onclick = () => sendCommand(0);

            listenToMotorState();
            loadHistory();
            setInterval(loadHistory, 5000);
        }
    </script>
</body>

</html>
